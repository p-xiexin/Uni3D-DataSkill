name: blendedmvs
display_name: BlendedMVS / BlendMVS
profile: multiview_mvs
domain: multiview_reconstruction
storage:
  carriers: [jpg, pfm, txt]
  unit: scene
  key_files:
    - pair.txt
    - cams/*_cam.txt
    - blended_images/*
    - rendered_depth_maps/*
required_files:
  - pair.txt
  - cams
  - blended_images
  - rendered_depth_maps
conventions:
  pose: world_to_camera
  camera_model: pinhole
  depth_unit: meter
  depth_encoding: pfm_m
adapter: blendedmvs
access: public
